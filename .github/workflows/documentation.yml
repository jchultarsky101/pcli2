name: Deploy Documentation

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Oranda
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/oranda/releases/latest/download/oranda-installer.sh | sh

      - name: Copy documentation files to ensure proper structure
        run: |
          # Ensure docs/src directory exists with all necessary files
          mkdir -p docs/src
          
          # Copy all documentation files to docs/src if they're not already there
          for file in docs/*.md; do
            if [ -f "$file" ]; then
              filename=$(basename "$file")
              # Skip if already exists to preserve original content
              if [ ! -f "docs/src/$filename" ]; then
                cp "$file" "docs/src/$filename"
              fi
            fi
          done
          
          # Ensure SUMMARY.md exists in docs/src
          if [ ! -f "docs/src/SUMMARY.md" ]; then
            echo "# Summary" > docs/src/SUMMARY.md
            echo "" >> docs/src/SUMMARY.md
            echo "[Introduction](README.md)" >> docs/src/SUMMARY.md
            echo "" >> docs/src/SUMMARY.md
            echo "- [Installation Guide](installation.md)" >> docs/src/SUMMARY.md
            echo "- [Quick Start Guide](quickstart.md)" >> docs/src/SUMMARY.md
            echo "- [Geometric Matching](geometric-matching.md)" >> docs/src/SUMMARY.md
            echo "- [Cross-Platform Configuration](cross_platform.md)" >> docs/src/SUMMARY.md
            echo "- [Documentation Deployment](documentation_deployment.md)" >> docs/src/SUMMARY.md
            echo "" >> docs/src/SUMMARY.md
            echo "<!-- This file is used by mdBook to generate the documentation navigation -->" >> docs/src/SUMMARY.md
          fi
          
      - name: Build Documentation
        run: oranda build
      
      - name: Copy LICENSE file to documentation
        run: cp LICENSE public/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./public

  deploy:
    # The github-pages environment only allows deployments from main, so a
    # manual dispatch from any other branch is doomed to fail at the
    # environment gate. Skip the deploy in that case — the build job still
    # validates that the documentation builds.
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # The Pages backend occasionally stalls a deployment in "queued" until
      # the action's 10-minute timeout (and a stalled deployment also breaks
      # manual re-runs of this job with "Deployment cancelled"), or rejects
      # deployments outright with "Deployment failed, try again later." for a
      # short window. A fresh deployment attempt supersedes the stalled one,
      # so retry once before failing the run - but wait first: an immediate
      # retry of a fast rejection lands inside the same backend outage window
      # (observed with v1.9.0, where both back-to-back attempts failed within
      # seconds and a later manual re-run succeeded).
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

      - name: Wait before retrying
        if: steps.deployment.outcome == 'failure'
        run: sleep 90

      - name: Retry deployment after transient Pages failure
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4